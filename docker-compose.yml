x-airflow-common: &airflow-common
  image: letterboxd-airflow:local
  env_file:
    - .env
  environment:
    AIRFLOW_HOME: /opt/airflow
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: UTC
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__PLUGINS_FOLDER: /opt/airflow/plugins
    AIRFLOW__CORE__STORE_SERIALIZED_DAGS: "True"
    AIRFLOW__DATABASE__LOAD_DEFAULT_CONNECTIONS: "False"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-postgres:5432/${AIRFLOW_DB_NAME}
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "True"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "False"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
    DBT_PROFILES_DIR: /opt/airflow/project/dbt/profiles
    DBT_TARGET: ${DBT_TARGET}
    LETTERBOXD_API_BASE_URL: http://api:8000
    LETTERBOXD_INGESTION_FILE_GLOB: ${LETTERBOXD_INGESTION_FILE_GLOB}
    LETTERBOXD_INGESTION_SOURCE_DIR: /opt/airflow/config/ingestion
    LETTERBOXD_PIPELINE_SCHEDULE: ${LETTERBOXD_PIPELINE_SCHEDULE}
    PYTHONPATH: /opt/airflow/project/bronze_loader
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/config:/opt/airflow/config
    - ./dbt:/opt/airflow/project/dbt
    - ./bronze_loader:/opt/airflow/project/bronze_loader

services:
  # Object Storage (MinIO)
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio_init:
    image: quay.io/minio/mc:latest
    container_name: minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/$${MINIO_BUCKET_RAW} || true &&
      mc anonymous set download local/$${MINIO_BUCKET_RAW} || true &&
      echo 'MinIO bucket ensured.'
      "

  # Metadata DB (Postgres)
  postgres-meta:
    image: postgres:16
    container_name: postgres-meta
    environment:
      POSTGRES_USER: ${POSTGRES_META_USER}
      POSTGRES_PASSWORD: ${POSTGRES_META_PASSWORD}
      POSTGRES_DB: ${POSTGRES_META_DB}
    volumes:
      - pg_meta_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_META_USER} -d ${POSTGRES_META_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-warehouse:
    image: postgres:16
    container_name: postgres-warehouse
    environment:
      POSTGRES_USER: ${POSTGRES_WAREHOUSE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_WAREHOUSE_PASSWORD}
      POSTGRES_DB: ${POSTGRES_WAREHOUSE_DB}
    volumes:
      - postgres_warehouse_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_WAREHOUSE_USER} -d ${POSTGRES_WAREHOUSE_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  db_bootstrap:
    image: postgres:16
    container_name: letterboxd_db_bootstrap
    env_file:
      - .env
    depends_on:
      postgres-meta:
        condition: service_healthy
      postgres-warehouse:
        condition: service_healthy
    volumes:
      - ./infra/bootstrap:/bootstrap:ro
    entrypoint: ["/bin/sh", "/bootstrap/bootstrap.sh"]

  dbt:
    build:
      context: .
      dockerfile: dbt/Dockerfile
    container_name: letterboxd_dbt
    working_dir: /usr/app
    env_file:
      - .env
    volumes:
      - ./dbt:/usr/app
      - ./dbt/profiles:/root/.dbt
    environment:
      DBT_PROFILES_DIR: /root/.dbt
    depends_on:
      db_bootstrap:
        condition: service_completed_successfully
    command: tail -f /dev/null

  bronze_loader:
    build:
      context: ./bronze_loader
      dockerfile: Dockerfile
    container_name: letterboxd_bronze_loader
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
      db_bootstrap:
        condition: service_completed_successfully
    profiles:
      - tooling

  airflow-postgres:
    image: postgres:16
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER} -d ${AIRFLOW_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    container_name: letterboxd_airflow_init
    build:
      context: ./airflow
      dockerfile: Dockerfile
    depends_on:
      airflow-postgres:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        airflow db migrate
        airflow users create \
          --username "${AIRFLOW_ADMIN_USERNAME}" \
          --firstname "${AIRFLOW_ADMIN_FIRSTNAME}" \
          --lastname "${AIRFLOW_ADMIN_LASTNAME}" \
          --role Admin \
          --email "${AIRFLOW_ADMIN_EMAIL}" \
          --password "${AIRFLOW_ADMIN_PASSWORD}" || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: letterboxd_airflow_webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://localhost:8080/health')\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: letterboxd_airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      api:
        condition: service_started
      db_bootstrap:
        condition: service_completed_successfully
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  airflow-triggerer:
    <<: *airflow-common
    container_name: letterboxd_airflow_triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type TriggererJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    hostname: metabase
    volumes:
      - /dev/urandom:/dev/random:ro
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${METABASE_APP_DB}
      MB_DB_PORT: 5432
      MB_DB_USER: ${METABASE_APP_USER}
      MB_DB_PASS: ${METABASE_APP_PASSWORD}
      MB_DB_HOST: metabase-postgres
    depends_on:
      - metabase-postgres
    healthcheck:
      test: ["CMD-SHELL", "curl --fail -I http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  metabase-postgres:
    image: postgres:16
    container_name: metabase-postgres
    hostname: metabase-postgres
    environment:
      POSTGRES_USER: ${METABASE_APP_USER}
      POSTGRES_DB: ${METABASE_APP_DB}
      POSTGRES_PASSWORD: ${METABASE_APP_PASSWORD}
    volumes:
      - metabase_pg_data:/var/lib/postgresql/data

  # API (FastAPI)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.api
    container_name: letterboxd_api
    env_file:
      - .env
    volumes:
      - ./api/app:/app/app
    ports:
      - "8000:8000"
    depends_on:
      minio:
        condition: service_healthy
      db_bootstrap:
        condition: service_completed_successfully

volumes:
  airflow_pg_data:
  metabase_pg_data:
  minio_data:
  pg_meta_data:
  postgres_warehouse_data:














