name: letterboxd
config-version: 2
version: "1.0.0"

profile: letterboxd

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
docs-paths: ["docs"]

packages-install-path: "dbt_packages"

clean-targets: ["target", "dbt_packages"]

# Optional: adds a comment to every query dbt runs (useful for debugging)
query-comment: "letterboxd dbt"

models:
  letterboxd:
    +materialized: table
    +schema: "silver"

seeds:
  letterboxd:
    +schema: "seeds"

snapshots:
  letterboxd:
    +schema: null