version: 2

models:
  - name: gold_top_rated_movies
    description: Top 10 highest rated movies from Letterboxd ratings data.
    columns:
      - name: letterboxd_uri
        tests:
          - not_null
          - unique
      - name: name
        tests:
          - not_null
      - name: rating
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0]
                quote: false

  - name: gold_watchlist_by_year
    description: Count of watchlist movies grouped by release year.
    columns:
      - name: year
        tests:
          - not_null
          - unique
      - name: watchlist_count
        tests:
          - not_null

  - name: gold_lowest_rated_movie
    description: Lowest rated movie from Letterboxd ratings data.
    columns:
      - name: letterboxd_uri
        tests:
          - not_null
          - unique
      - name: name
        tests:
          - not_null
      - name: rating
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0]
                quote: false

  - name: gold_best_movie_year
    description: Best movie year based on average rating, requiring at least 3 rated films.
    columns:
      - name: year
        tests:
          - not_null
          - unique
      - name: films_rated
        tests:
          - not_null
      - name: avg_rating
        tests:
          - not_null

  - name: gold_recent_watch
    description: Most recently watched movie from diary data.
    columns:
      - name: letterboxd_uri
        tests:
          - not_null
          - unique
      - name: watched_date
        tests:
          - not_null
      - name: name
        tests:
          - not_null

  - name: gold_watch_activity
    description: Overall watch history.
    columns:
      - name: watch_month
        tests:
          - not_null
          - unique
      - name: films_watched
        tests:
          - not_null
