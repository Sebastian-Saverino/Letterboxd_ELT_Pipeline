name: letterboxd
config-version: 2
version: "1.0.0"

profile: letterboxd

model-paths: ["letterboxd/models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["letterboxd/macros"]
snapshot-paths: ["snapshots"]
docs-paths: ["docs"]

packages-install-path: "dbt_packages"

clean-targets: ["target", "dbt_packages"]

query-comment: "letterboxd dbt"

models:
  letterboxd:
    silver:
      +schema: silver
      +materialized: table

    gold:
      +schema: gold
      +materialized: view

seeds:
  letterboxd:
    +schema: seeds

snapshots:
  letterboxd:
    +schema: null